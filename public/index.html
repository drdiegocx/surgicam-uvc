<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SurgiCam UVC Controller</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app">
      <div id="viewer">
        <div id="image-wrapper">
          <img
            id="stream"
            src="http://localhost:8080/?action=stream"
            alt="SurgiCam Stream"
            draggable="false"
          />
        </div>
        <div id="overlay">
          <div id="dock">
            <button id="snapshot-btn" class="action">📸 Captura</button>
            <button id="record-btn" class="action">⏺ Grabar</button>
            <label class="zoom-control">
              <span>Zoom</span>
              <input id="zoom-slider" type="range" min="1" max="4" step="0.1" value="1" />
            </label>
          </div>
        </div>
        <div id="roi-map" class="overlay-panel">
          <div class="map-frame">
            <img src="http://localhost:8080/?action=stream" alt="ROI map" draggable="false" />
            <div id="roi-viewport"></div>
          </div>
        </div>
        <button id="drawer-toggle" aria-label="Abrir controles">⚙️</button>
      </div>
      <aside id="control-drawer">
        <header>
          <h2>Controles de Cámara</h2>
        </header>
        <div id="controls-list"></div>
      </aside>
    </div>
    <div id="toast-container"></div>
    <script src="app.js"></script>
  </body>
</html>
